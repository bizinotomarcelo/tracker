<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="theme-color" content="#0D0D0D">
<title>Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg:     #0D0D0D;
  --s1:     #1A1A1A;
  --s2:     #222222;
  --s3:     #2A2A2A;
  --b1:     rgba(255,255,255,.07);
  --b2:     rgba(255,255,255,.13);
  --accent: #00FF88;
  --a-dim:  rgba(0,255,136,.08);
  --a-med:  rgba(0,255,136,.18);
  --t1:     #F5F5F5;
  --t2:     #7A7A7A;
  --t3:     #3A3A3A;
  --amber:  #D4920A;
  --red:    #FF4444;
  --f: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--t1); font-family: var(--f); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

/* ── HEADER ── */
.hdr { background: var(--bg); padding: 16px 24px 14px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--b1); }
.hdr-row { display: flex; align-items: center; justify-content: space-between; }
.user-block { display: flex; align-items: center; gap: 10px; }
.avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--s3); color: var(--t2); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.user-name { font-size: 14px; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
.user-date { font-size: 11px; color: var(--t2); }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.streak-chip { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--a-dim); border: 1px solid rgba(0,255,136,.2); padding: 4px 10px; border-radius: 6px; }
.gear-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--b1); background: transparent; color: var(--t2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.gear-btn:hover { border-color: var(--b2); color: var(--t1); }

/* ── NAV ── */
.bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); border-top: 1px solid var(--b1); display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
.ni { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 12px; border: none; background: transparent; cursor: pointer; color: var(--t3); transition: color .15s; font-family: var(--f); gap: 4px; }
.ni.active { color: var(--accent); }
.ni:hover:not(.active) { color: var(--t2); }
.ni svg { width: 20px; height: 20px; }
.ni-lbl { font-size: 10px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; animation: vIn .18s ease; }
@keyframes vIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── SECTION HEAD ── */
.sec-head { padding: 24px 24px 0; }
.sec-title { font-size: 32px; font-weight: 800; color: var(--t1); letter-spacing: -.04em; line-height: 1; }

/* ── TIMER BIG ── */
.timer-wrap { padding: 18px 24px 4px; display: flex; align-items: center; justify-content: center; gap: 24px; }
.timer-main { text-align: center; }
.timer-big { font-size: 72px; font-weight: 800; color: var(--t1); letter-spacing: -.04em; line-height: 1; font-feature-settings: 'tnum' 1; }
.timer-hint { font-size: 11px; color: var(--t2); margin-top: 6px; letter-spacing: .06em; text-transform: uppercase; }
.timer-play-btn { width: 54px; height: 54px; border-radius: 50%; border: 1.5px solid var(--b2); background: transparent; color: var(--t2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.timer-play-btn:hover { border-color: rgba(0,255,136,.4); color: var(--accent); }
.timer-play-btn.running { border-color: rgba(0,255,136,.4); color: var(--accent); }

/* ── SEGMENT CONTROL ── */
.seg-wrap { padding: 16px 24px 0; }
.seg-ctrl { display: flex; background: var(--s1); border-radius: 10px; padding: 3px; gap: 2px; }
.seg-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; color: var(--t2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--f); transition: all .15s; white-space: nowrap; text-align: center; letter-spacing: .01em; }
.seg-btn.active { background: var(--t1); color: #0D0D0D; }
.seg-btn:hover:not(.active) { color: var(--t1); }

/* ── EXERCISE CARDS ── */
.ex-wrap { padding: 14px 24px 0; }
.ex-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; margin-bottom: 10px; transition: border-color .15s; }
.ex-card:focus-within { border-color: rgba(0,255,136,.15); }
.ex-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 3px; gap: 8px; }
.ex-name { font-size: 17px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; line-height: 1.2; }
.ex-badge { font-size: 9px; font-weight: 600; padding: 3px 7px; border-radius: 4px; letter-spacing: .08em; flex-shrink: 0; text-transform: uppercase; margin-top: 3px; }
.ex-badge.composto { background: var(--a-dim); color: var(--accent); border: 1px solid rgba(0,255,136,.15); }
.ex-badge.isolador  { background: rgba(212,146,10,.08); color: var(--amber); border: 1px solid rgba(212,146,10,.2); }
.ex-note { font-size: 12px; color: var(--t2); margin-bottom: 14px; }
.set-lbls { display: grid; grid-template-columns: 28px 1fr 1fr 28px; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
.set-lbl  { font-size: 9px; font-weight: 600; color: var(--t3); text-align: center; letter-spacing: .1em; text-transform: uppercase; }
.sets-tbl { width: 100%; }
.set-row  { display: grid; grid-template-columns: 28px 1fr 1fr 28px; gap: 8px; align-items: center; margin-bottom: 6px; }
.set-num { font-size: 13px; font-weight: 600; color: var(--t3); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-feature-settings: 'tnum' 1; transition: color .2s; }
.set-num.done { color: var(--accent); }
.set-inp { background: var(--s2); border: 1px solid var(--b1); color: var(--t1); border-radius: 8px; padding: 10px 6px; font-family: var(--f); font-size: 16px; font-weight: 700; text-align: center; width: 100%; outline: none; transition: border-color .15s; -moz-appearance: textfield; font-feature-settings: 'tnum' 1; }
.set-inp::-webkit-outer-spin-button, .set-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.set-inp:focus { border-color: rgba(0,255,136,.35); background: #262626; }
.set-inp::placeholder { color: var(--t3); font-weight: 400; font-size: 13px; }
.set-inp.has-v { border-color: var(--b2); }
.rm-set { width: 28px; height: 40px; border-radius: 6px; background: transparent; border: 1px solid var(--b1); color: var(--t3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.rm-set:hover { border-color: rgba(255,68,68,.4); color: var(--red); }
.add-set { width: 100%; padding: 9px; border-radius: 8px; background: transparent; border: 1px dashed var(--b1); color: var(--t2); cursor: pointer; font-size: 12px; font-weight: 500; font-family: var(--f); margin-top: 6px; transition: all .15s; letter-spacing: .02em; }
.add-set:hover { border-color: rgba(0,255,136,.3); color: var(--accent); }
.last-perf { font-size: 11px; color: var(--t2); margin-top: 10px; padding: 8px 12px; background: var(--bg); border-radius: 6px; letter-spacing: .01em; }
.last-perf .hi { color: var(--accent); font-weight: 600; }

/* ── SWAP EXERCISE ── */
.ex-actions { display: flex; gap: 8px; margin-top: 10px; }
.ex-act-btn { flex: 1; background: var(--s2); border: 1px solid var(--b1); color: var(--t1); font-family: var(--f); font-size: 11px; font-weight: 600; padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; letter-spacing: .02em; transition: all .15s; }
.ex-act-btn:hover { border-color: rgba(0,255,136,.3); color: var(--accent); }
.ex-act-btn.restore { color: var(--amber); }
.ex-act-btn.restore:hover { border-color: rgba(212,146,10,.3); color: var(--amber); }
.swap-panel { margin-top: 12px; padding: 12px; background: var(--bg); border: 1px solid var(--b1); border-radius: 10px; }
.swap-loading { font-size: 12px; color: var(--t2); text-align: center; padding: 8px; }
.swap-search { width: 100%; background: var(--s2); border: 1px solid var(--b1); border-radius: 8px; padding: 9px 10px; color: var(--t1); font-family: var(--f); font-size: 13px; margin-bottom: 8px; box-sizing: border-box; outline: none; }
.swap-search::placeholder { color: var(--t3); }
.swap-filters { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.swap-chip { font-size: 10px; padding: 5px 10px; border-radius: 999px; background: var(--s2); border: 1px solid var(--b1); color: var(--t2); cursor: pointer; transition: all .15s; }
.swap-chip.active { background: var(--a-med); color: var(--accent); border-color: rgba(0,255,136,.25); }
.swap-results { max-height: 240px; overflow-y: auto; }
.swap-result { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid var(--b1); }
.swap-result:last-child { border-bottom: none; }
.swap-res-name { font-size: 12px; font-weight: 600; color: var(--t1); }
.swap-res-meta { font-size: 10px; color: var(--t2); margin-top: 2px; text-transform: capitalize; }
.swap-pick { font-size: 10px; font-weight: 700; color: var(--accent); border: 1px solid rgba(0,255,136,.25); border-radius: 8px; padding: 6px 10px; background: transparent; cursor: pointer; flex-shrink: 0; font-family: var(--f); }
.swap-empty { font-size: 12px; color: var(--t2); text-align: center; padding: 12px; }

/* ── SAVE — moved to SAVE BUTTON section below ── */

/* ── NUTRIÇÃO ── */
.nutr-nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 0; }
.nutr-day-pill { font-size: 14px; font-weight: 600; color: var(--t1); background: var(--s1); border: 1px solid var(--b2); padding: 8px 20px; border-radius: 20px; letter-spacing: -.01em; }
.day-arr { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--b1); background: transparent; color: var(--t2); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all .15s; line-height: 1; }
.day-arr:hover { border-color: var(--b2); color: var(--t1); }
.macro-bars { padding: 20px 24px 4px; display: flex; flex-direction: column; gap: 14px; }
.macro-row  { display: flex; align-items: center; gap: 12px; }
.macro-name { font-size: 12px; font-weight: 500; color: var(--t2); width: 62px; }
.macro-track { flex: 1; height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.macro-fill  { height: 100%; border-radius: 2px; background: var(--accent); transition: width .4s ease; }
.macro-val  { font-size: 12px; color: var(--t2); min-width: 108px; text-align: right; font-feature-settings: 'tnum' 1; }
.macro-val strong { color: var(--t1); font-weight: 700; }
.meals-wrap { padding: 20px 24px 8px; }
.meal-card  { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
.meal-card.done { border-color: rgba(0,255,136,.2); }
.meal-hdr { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 10px; }
.meal-name-txt { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -.01em; }
.meal-time-chip { font-size: 10px; font-weight: 600; color: var(--t2); background: var(--s2); border: 1px solid var(--b1); padding: 3px 7px; border-radius: 5px; flex-shrink: 0; letter-spacing: .04em; }
.meal-kcal { font-size: 12px; font-weight: 500; color: var(--t2); flex-shrink: 0; font-feature-settings: 'tnum' 1; }
.meal-chev { font-size: 12px; color: var(--t3); transition: transform .2s; flex-shrink: 0; }
.meal-chev.open { transform: rotate(180deg); }
.meal-items { border-top: 1px solid var(--b1); display: none; }
.meal-items.open { display: block; }
.meal-item { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--b1); gap: 12px; }
.meal-item:last-child { border-bottom: none; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 13px; font-weight: 500; color: var(--t1); letter-spacing: -.01em; }
.item-qty { font-size: 11px; color: var(--t2); margin-top: 1px; cursor: text; border-bottom: 1px dashed transparent; transition: border-color .15s; outline: none; display: inline-block; min-width: 20px; }
.item-qty:hover  { border-bottom-color: var(--b2); }
.item-qty:focus  { border-bottom-color: rgba(0,255,136,.4); color: var(--t1); }
.item-cb { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--b2); background: transparent; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.item-cb.checked { background: var(--accent); border-color: var(--accent); }
.item-cb svg { display: none; width: 12px; height: 12px; }
.item-cb.checked svg { display: block; }
.meal-notes-wrap { padding: 10px 16px 14px; border-top: 1px solid var(--b1); }
.meal-notes { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--b1); color: var(--t2); font-family: var(--f); font-size: 12px; padding: 4px 0 6px; resize: none; outline: none; transition: border-color .15s; line-height: 1.5; min-height: 32px; }
.meal-notes:focus { border-bottom-color: rgba(0,255,136,.35); color: var(--t1); }
.meal-notes::placeholder { color: var(--t3); }

/* ── HISTÓRICO ── */
.hist-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 24px; }
.stat-block { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; }
.stat-val { font-size: 26px; font-weight: 800; color: var(--t1); line-height: 1; letter-spacing: -.03em; font-feature-settings: 'tnum' 1; }
.stat-lbl { font-size: 10px; font-weight: 500; color: var(--t2); letter-spacing: .06em; text-transform: uppercase; margin-top: 5px; line-height: 1.4; }
.stat-div { display: none; }
.cal-wrap  { padding: 4px 24px 0; }
.cal-nav   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-mo    { font-size: 17px; font-weight: 700; letter-spacing: -.02em; text-transform: capitalize; }
.cal-arrows { display: flex; gap: 6px; }
.cal-arr   { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--b1); background: transparent; color: var(--t2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s; line-height: 1; }
.cal-arr:hover { border-color: var(--b2); color: var(--t1); }
.cal-card  { background: var(--s1); border-radius: 14px; border: 1px solid var(--b1); padding: 16px 10px 12px; }
.cal-dow   { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
.cal-dow-c { font-size: 9px; font-weight: 600; color: var(--t3); text-align: center; letter-spacing: .06em; text-transform: uppercase; }
.cal-grid  { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-c { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--t2); transition: all .15s; gap: 3px; }
.cal-c.trained    { color: var(--t1); font-weight: 700; cursor: pointer; }
.cal-c.trained:hover { background: var(--s2); }
.cal-c.today      { border: 1.5px solid var(--accent); color: var(--accent); font-weight: 700; }
.cal-c.selected   { background: var(--s3); }
.cal-c.future     { color: var(--t3); }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.cal-day-card { margin: 12px 24px 0; background: var(--s1); border: 1px solid rgba(0,255,136,.25); border-radius: 14px; padding: 16px 18px; }
.cdc-name { font-size: 18px; font-weight: 800; color: var(--t1); letter-spacing: -.02em; margin-bottom: 4px; }
.cdc-meta { font-size: 12px; color: var(--t2); margin-bottom: 10px; }
.cdc-vol  { font-size: 13px; font-weight: 500; color: var(--t1); }
.cdc-vol span { color: var(--accent); }
.streak-bar { text-align: center; padding: 14px 24px 2px; font-size: 13px; color: var(--t2); }
.streak-bar strong { color: var(--t1); }
.io-btns { display: flex; gap: 8px; padding: 16px 24px 0; }
.io-btn  { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--b1); background: transparent; color: var(--t2); font-size: 12px; font-weight: 500; font-family: var(--f); cursor: pointer; transition: all .15s; text-align: center; }
.io-btn:hover { border-color: var(--b2); color: var(--t1); }
.hist-list { padding: 16px 24px 8px; }
.mo-head   { display: flex; align-items: center; justify-content: space-between; font-size: 10px; font-weight: 600; color: var(--t2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }
.mo-vol { color: var(--amber); }
.hi-item { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 16px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
.hi-item:hover { border-color: var(--b2); }
.hi-item.hl    { border-color: rgba(0,255,136,.3); }
.hi-hdr  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.hi-left { display: flex; align-items: center; gap: 12px; }
.hi-dot  { width: 36px; height: 36px; border-radius: 8px; background: var(--s3); border: 1px solid var(--b1); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--accent); flex-shrink: 0; font-feature-settings: 'tnum' 1; }
.hi-day  { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
.hi-date { font-size: 11px; color: var(--t2); margin-top: 1px; }
.hi-vol  { font-size: 11px; color: var(--t2); background: var(--s2); padding: 4px 9px; border-radius: 6px; border: 1px solid var(--b1); font-feature-settings: 'tnum' 1; font-weight: 500; }
.hi-exlist { font-size: 12px; color: var(--t2); line-height: 1.6; margin-left: 48px; }
.expand    { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--b1); }
.expand.open { display: block; }
.exd-block   { margin-bottom: 12px; }
.exd-name    { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--t1); letter-spacing: -.01em; }
.exd-row     { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; color: var(--t2); border-bottom: 1px solid var(--b1); }
.exd-row:last-child { border-bottom: none; }
.exd-row span:last-child { font-weight: 600; color: var(--t1); font-feature-settings: 'tnum' 1; }
.hi-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.hi-tag  { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 5px; background: var(--s2); color: var(--t2); border: 1px solid var(--b1); font-feature-settings: 'tnum' 1; }
.health-btn { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; padding: 10px 14px; border-radius: 8px; background: transparent; border: 1px solid var(--b1); color: var(--t2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: var(--f); width: 100%; }
.health-btn:hover { border-color: rgba(0,255,136,.3); color: var(--accent); }
.health-hint { font-size: 10px; color: var(--t3); text-align: center; margin-top: 5px; }
.del-btn { margin-top: 10px; padding: 8px 14px; border-radius: 6px; background: transparent; border: 1px solid var(--b1); color: rgba(255,68,68,.7); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: var(--f); }
.del-btn:hover { background: rgba(255,68,68,.08); border-color: rgba(255,68,68,.4); color: var(--red); }
.empty-state { text-align: center; padding: 48px 24px; color: var(--t2); font-size: 13px; }

/* ── EVOLUÇÃO ── */
.evo-wrap { padding: 20px 24px 24px; }
.period-tabs { display: flex; background: var(--s1); border-radius: 10px; padding: 3px; gap: 2px; margin-bottom: 20px; }
.period-tab { flex: 1; padding: 9px; border-radius: 8px; border: none; background: transparent; color: var(--t2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--f); transition: all .15s; text-align: center; }
.period-tab.active { background: var(--t1); color: #0D0D0D; }
.period-tab:hover:not(.active) { color: var(--t1); }
.chart-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.evo-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.evo-stat-big { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; }
.evo-stat-sm-col { display: flex; flex-direction: column; gap: 10px; }
.evo-stat-sm { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 14px; flex: 1; }
.evo-stat-lbl { font-size: 9px; font-weight: 600; color: var(--t2); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.evo-stat-num    { font-size: 26px; font-weight: 800; color: var(--t1); letter-spacing: -.03em; line-height: 1; font-feature-settings: 'tnum' 1; }
.evo-stat-num-sm { font-size: 22px; font-weight: 800; color: var(--t1); letter-spacing: -.03em; line-height: 1; font-feature-settings: 'tnum' 1; }
.evo-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; margin-top: 8px; letter-spacing: .03em; }
.evo-badge.up   { background: var(--a-med); color: var(--accent); border: 1px solid rgba(0,255,136,.2); }
.evo-badge.down { background: rgba(255,68,68,.1); color: var(--red); border: 1px solid rgba(255,68,68,.2); }
.evo-insight { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 16px 18px; font-size: 13px; color: var(--t2); line-height: 1.6; }
.evo-insight strong { color: var(--t1); }
.evo-section-head { font-size: 11px; font-weight: 600; color: var(--t2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; margin-top: 22px; }
.evo-select { width: 100%; background: var(--s2); border: 1px solid var(--b1); color: var(--t1); border-radius: 8px; padding: 10px 14px; font-family: var(--f); font-size: 14px; font-weight: 500; outline: none; cursor: pointer; margin-bottom: 12px; -webkit-appearance: none; appearance: none; }
.evo-select:focus { border-color: rgba(0,255,136,.35); }
.evo-no-data { font-size: 13px; color: var(--t3); padding: 28px 0; text-align: center; }

/* ── SETTINGS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 30; opacity: 0; pointer-events: none; transition: opacity .2s; }
.overlay.show { opacity: 1; pointer-events: all; }
.settings-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 480px; background: var(--s1); border-top: 1px solid var(--b1); border-radius: 16px 16px 0 0; padding: 28px 24px 40px; z-index: 31; transition: transform .28s cubic-bezier(.4,0,.2,1); }
.settings-panel.show { transform: translateX(-50%) translateY(0); }
.settings-title { font-size: 16px; font-weight: 700; margin-bottom: 22px; letter-spacing: -.01em; }
.settings-lbl   { font-size: 10px; font-weight: 600; color: var(--t2); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
.settings-inp { width: 100%; background: var(--s2); border: 1px solid var(--b1); color: var(--t1); border-radius: 8px; padding: 12px 14px; font-family: var(--f); font-size: 15px; font-weight: 500; outline: none; transition: border-color .15s; -moz-appearance: textfield; }
.settings-inp::-webkit-outer-spin-button, .settings-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.settings-inp:focus { border-color: rgba(0,255,136,.4); }
.settings-save { width: 100%; padding: 14px; border-radius: 10px; background: var(--t1); border: none; color: #0D0D0D; font-family: var(--f); font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; letter-spacing: .03em; text-transform: uppercase; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--s1); border: 1px solid var(--b2); color: var(--t1); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 100; white-space: nowrap; }
.toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok    { border-color: rgba(0,255,136,.35); color: var(--accent); }

/* ── TIMER BAR (header) ── */
.hdr-timer { display: flex; align-items: center; gap: 14px; padding-top: 12px; border-top: 1px solid var(--b1); margin-top: 12px; }
.ht-block { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
.ht-time { font-size: 34px; font-weight: 800; letter-spacing: -.04em; color: var(--t1); font-feature-settings: 'tnum' 1; line-height: 1; }
.ht-time.rest-time { font-size: 28px; color: var(--t2); transition: color .3s; }
.ht-time.rest-time.alert { color: var(--accent); }
.ht-hint { font-size: 9px; color: var(--t3); letter-spacing: .06em; text-transform: uppercase; margin-top: 3px; }
.ht-sep { width: 1px; height: 36px; background: var(--b2); flex-shrink: 0; }
.ht-spacer { flex: 1; }

/* ── WEEK CHIP ── */
.week-chip { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--a-dim); border: 1px solid rgba(0,255,136,.2); padding: 4px 10px; border-radius: 6px; }

/* ── SAVE BUTTON ── */
.save-wrap { padding: 24px 24px 8px; }
.save-btn { width: 100%; padding: 16px; border-radius: 14px; background: var(--t1); border: none; color: #0D0D0D; font-family: var(--f); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: .02em; transition: all .15s; }
.save-btn:hover { background: #e0e0e0; }
.save-btn:active { transform: scale(.98); }

/* ── RESUME MODAL ── */
.resume-modal { position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 60; display: flex; align-items: flex-end; justify-content: center; }
.resume-panel { background: var(--s1); border-radius: 16px 16px 0 0; padding: 28px 24px calc(32px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; border-top: 1px solid var(--b1); }
.resume-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.01em; }
.resume-msg { font-size: 13px; color: var(--t2); margin-bottom: 22px; line-height: 1.5; }
.resume-btn-p { width: 100%; padding: 15px; border-radius: 10px; background: var(--t1); border: none; color: #0D0D0D; font-family: var(--f); font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; letter-spacing: .02em; }
.resume-btn-s { width: 100%; padding: 13px; border-radius: 10px; background: transparent; border: 1px solid var(--b1); color: var(--t2); font-family: var(--f); font-size: 14px; cursor: pointer; }

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; opacity: 1;
  transition: opacity .6s ease;
  overflow: hidden;
}
#splash.fade { opacity: 0; pointer-events: none; }
.splash-bg {
  position: absolute; inset: 0;
  background-image: url('splash-bg.jpg');
  background-size: cover; background-position: center top;
  filter: brightness(.12) saturate(.25) blur(3px);
  transform: scale(1.06);
}
.splash-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, #0D0D0D 20%, rgba(13,13,13,.82) 60%, rgba(13,13,13,.65) 100%);
}
.splash-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
}
.splash-icon {
  width: 132px; height: 132px;
  background: #1A1A1A;
  border-radius: 32px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 1px rgba(255,255,255,.07), 0 32px 80px rgba(0,0,0,.8);
}
.splash-name {
  color: #F0F0F0; font-size: 28px; font-weight: 400;
  margin-top: 20px; letter-spacing: .08em;
  font-family: var(--f); text-transform: uppercase;
}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────
function todayISO()   { return new Date().toISOString().split('T')[0]; }
function parseDate(s) { return new Date(s + 'T12:00:00'); }
function fmtDate(s)   { return parseDate(s).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function getWeight()  { return parseFloat(localStorage.getItem('mb_weight') || '90'); }
function calcVol(w)   { return w.exercises.reduce((a,ex)=>a+ex.sets.reduce((s,set)=>s+(parseFloat(set.kg||0)*parseInt(set.reps||0)),0),0); }
function totalVolAll(){ return workouts.reduce((a,w)=>a+calcVol(w),0); }
function fmtNum(n) {
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000)    return (n/1000).toFixed(1)+'k';
  return Math.round(n).toLocaleString('pt-BR');
}
function calcCalories(key,min) {
  return Math.round((DAYS.find(d=>d.key===key)?.met||5.0)*getWeight()*(min/60));
}

function getStreak() {
  if(!workouts.length) return 0;
  const dates=[...new Set(workouts.map(w=>w.date))].sort().reverse();
  let streak=0,ref=parseDate(todayISO());
  for(const d of dates){
    if((ref-parseDate(d))/86400000<2){streak++;ref=parseDate(d);}else break;
  }
  return streak;
}

function toggleTimer() {
  var btn = document.getElementById('timerBtn');

    timerElapsed += Date.now() - timerResumedAt;
    timerRunning = false;
    clearInterval(timerIv); timerIv = null;

  } else {
    timerResumedAt = Date.now();
    timerRunning = true;
    timerIv = setInterval(tickTimer, 1000);

    if(btn){ btn.classList.add('running'); btn.innerHTML = T_PAUSE; }

}
function startTimer() {

  timerElapsed = 0; timerRunning = false; timerResumedAt = null;
  var el = document.getElementById('timerDisplay'); if(el) el.textContent = '00:00';

// ── REST TIMER ─────────────────────────────────────────
function startRestTimer() {
  clearInterval(restIv); restIv = null;
  restElapsed = 0; restAlerted = false;
  restRunning = true; restResumedAt = Date.now();
  var el = document.getElementById('restDisplay');
  if(el){ el.textContent='00:00'; el.classList.remove('alert'); }
  restIv = setInterval(tickRestTimer, 1000);
}
function stopRestTimer() {
  clearInterval(restIv); restIv = null; restRunning = false;
  restElapsed = 0; restAlerted = false;
  var el = document.getElementById('restDisplay');
  if(el){ el.textContent='00:00'; el.classList.remove('alert'); }
}
function tickRestTimer() {
  if(!restRunning) return;
  var total = restElapsed + (Date.now() - restResumedAt);
  var s = Math.floor(total / 1000);
  var el = document.getElementById('restDisplay');
  if(el) el.textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  if(s >= 120 && !restAlerted) {
    restAlerted = true;
    if(el) el.classList.add('alert');
    alertRest();
  }
}
function alertRest() {
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0, 0.35].forEach(function(when) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.4, ctx.currentTime+when);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+when+0.3);
      o.start(ctx.currentTime+when); o.stop(ctx.currentTime+when+0.3);
    });
  } catch(e) {}
}
function tickTimer() {
  var el = document.getElementById('timerDisplay');
  if(!el || !timerRunning) return;
  var total = timerElapsed + (Date.now() - timerResumedAt);
  var s = Math.floor(total / 1000);
  el.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function getElapsedSecs() {
  if(timerRunning) return Math.floor((timerElapsed + Date.now() - timerResumedAt) / 1000);
  return Math.floor(timerElapsed / 1000);
}

// ── Captura/restauração de séries em andamento por tipo de treino ─
function captureSets(day) {
  var sets={};
  day.exercises.forEach(function(ex,i){
    var container=document.getElementById('sets-'+i);
    if(!container) return;
    var rows=container.querySelectorAll('.set-row');
    var s=[];
    rows.forEach(function(_,j){
      var kg=document.getElementById('kg-'+i+'-'+j);
      var rp=document.getElementById('rp-'+i+'-'+j);
      s.push({kg:kg?kg.value:'',reps:rp?rp.value:''});
    });
    sets[i]=s;
  });
  return sets;
}

function applySets(day,sets) {
  if(!sets) return;
  Object.keys(sets).forEach(function(ei){
    var rows=sets[ei];
    var exIdx=parseInt(ei);
    var container=document.getElementById('sets-'+ei);
    if(!container) return;
    var existing=container.querySelectorAll('.set-row').length;
    var rr=day.exercises[exIdx]?day.exercises[exIdx].repsRange:'';
    for(var j=existing;j<rows.length;j++) addSet(exIdx,rr);
    rows.forEach(function(s,j){
      var kg=document.getElementById('kg-'+ei+'-'+j);
      var rp=document.getElementById('rp-'+ei+'-'+j);
      var sn=document.getElementById('sn-'+ei+'-'+j);
      if(kg&&s.kg){kg.value=s.kg;kg.classList.add('has-v');}
      if(rp&&s.reps){rp.value=s.reps;rp.classList.add('has-v');}
      if(sn&&s.kg&&s.reps) sn.classList.add('done');
    });
  });
}

function getLastPerf(name) {
  const s=workouts.filter(w=>w.exercises.find(e=>e.name===name));
  if(!s.length) return null;
  const last=s[s.length-1];
  const ex=last.exercises.find(e=>e.name===name);
  if(!ex||!ex.sets.length) return null;
  const best=ex.sets.reduce((a,b)=>parseFloat(b.kg||0)>parseFloat(a.kg||0)?b:a);
  return {date:last.date,best};
}

function getOverrides() {

// ── TROCAR EXERCÍCIO (catálogo PT-BR) ─────────────────
function normName(s) {
  var stop=['c','com','de','do','da','no','na','em'];
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ')
    .split(' ').filter(function(t){return t&&stop.indexOf(t)===-1;}).sort().join(' ');
}
function loadExDb(cb) {
  if(exDb) { cb(); return; }
  var cached=localStorage.getItem('mb_exdb');
  if(cached) { try{ exDb=JSON.parse(cached); cb(); return; }catch(e){} }
  fetch('exercises-db.json').then(function(r){return r.json();}).then(function(data){
    exDb=data;
    try{ localStorage.setItem('mb_exdb',JSON.stringify(data)); }catch(e){}
    cb();
  }).catch(function(){ showToast('Não foi possível carregar o catálogo.',false); });
}
function toggleSwapPanel(ei) {
  var panel=document.getElementById('swap-'+ei);
  if(!panel) return;
  if(panel.style.display==='block') { panel.style.display='none'; panel.innerHTML=''; return; }
  document.querySelectorAll('.swap-panel').forEach(function(p){ p.style.display='none'; p.innerHTML=''; });
  panel.style.display='block';
  panel.innerHTML='<div class="swap-loading">Carregando catálogo...</div>';
  loadExDb(function(){
    var ex=getEffectiveExercise(selectedDay,ei);
    var match=exDb.find(function(d){ return normName(d.name)===normName(ex.name); });
    swapState[ei]={
      query:'',
      muscles: match ? new Set(match.primaryMuscles) : new Set(),
      equip: match && match.equipment ? new Set([match.equipment]) : new Set()
    };
    renderSwapPanel(ei);
  });
}
function renderSwapPanel(ei) {
  var panel=document.getElementById('swap-'+ei);
  if(!panel) return;
  var st=swapState[ei];
  var ex=getEffectiveExercise(selectedDay,ei);
  var match=exDb.find(function(d){ return normName(d.name)===normName(ex.name); });
  var muscleOpts=match ? Array.from(new Set(match.primaryMuscles.concat(match.secondaryMuscles||[]))) : [];
  var equipOpts=match && match.equipment ? [match.equipment] : [];

  var q=normName(st.query);
  var results=exDb.filter(function(d){
    if(q && !normName(d.name).includes(q)) return false;
    if(st.muscles.size && !d.primaryMuscles.some(function(m){return st.muscles.has(m);})) return false;
    if(st.equip.size && !st.equip.has(d.equipment)) return false;
    return true;
  }).slice(0,25);

  var chipsHtml=muscleOpts.map(function(m){
    return '<span class="swap-chip '+(st.muscles.has(m)?'active':'')+'" onclick="toggleSwapFilter('+ei+',\'muscle\',\''+m+'\')">'+m+'</span>';
  }).join('')+equipOpts.map(function(eq){
    return '<span class="swap-chip '+(st.equip.has(eq)?'active':'')+'" onclick="toggleSwapFilter('+ei+',\'equip\',\''+eq+'\')">'+eq+'</span>';
  }).join('');

  var resultsHtml=results.length
    ? results.map(function(d){
        var meta=(d.primaryMuscles||[]).join(', ')+(d.equipment?' — '+d.equipment:'');
        return '<div class="swap-result">'
          +'<div><div class="swap-res-name">'+d.name+'</div><div class="swap-res-meta">'+meta+'</div></div>'
          +'<button class="swap-pick" onclick="pickExercise('+ei+',\''+d.id+'\')">Usar</button>'
          +'</div>';
      }).join('')
    : '<div class="swap-empty">Nenhum exercício encontrado.</div>';

  panel.innerHTML=
    '<input class="swap-search" placeholder="Buscar exercício..." value="'+st.query.replace(/"/g,'&quot;')+'" oninput="onSwapSearch('+ei+',this.value)">'
    +(chipsHtml?'<div class="swap-filters">'+chipsHtml+'</div>':'')
    +'<div class="swap-results">'+resultsHtml+'</div>';
}
function toggleSwapFilter(ei,kind,val) {
  var st=swapState[ei];
  var set=kind==='muscle'?st.muscles:st.equip;
  if(set.has(val)) set.delete(val); else set.add(val);
  renderSwapPanel(ei);
}
function onSwapSearch(ei,val) {
  swapState[ei].query=val;
  renderSwapPanel(ei);
}
function pickExercise(ei,id) {
  var item=exDb.find(function(d){ return d.id===id; });
  if(!item) return;
  var type=item.mechanic==='isolado'?'isolador':'composto';
  var ov=getOverrides();
  ov[selectedDay.key]=ov[selectedDay.key]||{};
  ov[selectedDay.key][ei]={name:item.name,type:type};
  saveOverrides(ov);
  delete swapState[ei];
  renderExercises();
}
function restoreExercise(ei) {
  var ov=getOverrides();
  if(ov[selectedDay.key]) {
    delete ov[selectedDay.key][ei];
    saveOverrides(ov);
  }
  renderExercises();
}

function renderSetRow(ei,si,rr) {
  return '<div class="set-row" id="sr-'+ei+'-'+si+'">'
    +'<span class="set-num" id="sn-'+ei+'-'+si+'">'+(si+1)+'</span>'
    +'<input class="set-inp" type="number" placeholder="--" id="kg-'+ei+'-'+si+'" min="0" step="0.5" oninput="onSetIn('+ei+','+si+')">'
    +'<input class="set-inp" type="number" placeholder="'+(rr||'--')+'" id="rp-'+ei+'-'+si+'" min="0" step="1" oninput="onSetIn('+ei+','+si+')">'
    +'<button class="rm-set" onclick="removeSet('+ei+','+si+')">x</button>'
    +'</div>';
}

function onSetIn(ei,si) {
  var kg=document.getElementById('kg-'+ei+'-'+si);
  var rp=document.getElementById('rp-'+ei+'-'+si);
  var sn=document.getElementById('sn-'+ei+'-'+si);
  var both=!!(kg&&kg.value&&rp&&rp.value);
  if(sn) sn.classList.toggle('done',both);
  if(kg) kg.classList.toggle('has-v',!!kg.value);
  if(rp) rp.classList.toggle('has-v',!!rp.value);
  if(both) {
    if(!timerRunning && timerElapsed===0) { toggleTimer(); }
    startRestTimer();
    lastSetTime=Date.now();
    saveDraft();
  }
}

function addSet(ei,rr) {
  var c=document.getElementById('sets-'+ei);
  c.insertAdjacentHTML('beforeend',renderSetRow(ei,c.querySelectorAll('.set-row').length,rr));
  reIdx(ei);
}
function removeSet(ei,si) {
  var c=document.getElementById('sets-'+ei);
  if(c.querySelectorAll('.set-row').length<=1) return;
  c.querySelectorAll('.set-row')[si].remove();
  reIdx(ei);
}
function reIdx(ei) {
  document.getElementById('sets-'+ei).querySelectorAll('.set-row').forEach(function(row,i){

    var sn=row.querySelector('.set-num'); sn.textContent=i+1; sn.id='sn-'+ei+'-'+i;

// ── SAVE ──────────────────────────────────────────────
function saveWorkout(auto) {
  typeData[selectedDay.key]=captureSets(selectedDay);
  var exercises=[];
  var usedNames=[];
  DAYS.forEach(function(day){
    var setsByEx=typeData[day.key];
    if(!setsByEx) return;
    var hasAny=false;
    day.exercises.forEach(function(ex,i){
      var rows=setsByEx[i]||[];
      var sets=rows.filter(function(r){return r.kg||r.reps;});
      if(sets.length>0){ exercises.push({name:ex.name,sets:sets}); hasAny=true; }
    });
    if(hasAny) usedNames.push(day.name);
  });
  if(!exercises.length){
    if(!auto) showToast('Registre ao menos uma serie.',false);
    return;
  }
  var durSec=getElapsedSecs();
  var durMin=Math.max(1,Math.floor(durSec/60));
  var kcal=calcCalories(selectedDay.key,durMin);
  var dayName=usedNames.join(' + ');
  workouts.push({id:Date.now(),date:todayISO(),dayKey:selectedDay.key,dayName:dayName,exercises:exercises,duration:durSec,calories:kcal});
  localStorage.setItem('mb_workouts',JSON.stringify(workouts));
  localStorage.removeItem('mb_draft');
  typeData={};
  lastSetTime=null;
  showToast((auto?'Treino finalizado automaticamente: ':'')+dayName+' - '+durMin+'min - '+kcal+' kcal',true);
  updateHeader(); resetTimer(); renderExercises();
  document.getElementById('hdrTimer').style.display='none';
}

// ── AUTO-FINISH (1h sem novo registro) ────────────────
function checkAutoFinish() {
  if(!lastSetTime) return;
  if(Date.now()-lastSetTime>AUTO_FINISH_MS) saveWorkout(true);
}
setInterval(checkAutoFinish,60*1000);
document.addEventListener('visibilitychange',function(){ if(!document.hidden) checkAutoFinish(); });

// ── NUTRITION ─────────────────────────────────────────
function getNutrDay(iso)       { return JSON.parse(localStorage.getItem('mb_nutr_'+iso)||'{}'); }
function saveNutrDay(iso,data) { localStorage.setItem('mb_nutr_'+iso,JSON.stringify(data)); }

function nutrChangeDay(dir) {
  var d=parseDate(nutrDate); d.setDate(d.getDate()+dir);
  var next=d.toISOString().split('T')[0];
  if(next>todayISO()) return;
  nutrDate=next; renderNutrition();
}

function getConsumedMacros(iso) {
  var day=getNutrDay(iso);
  var m={kcal:0,prot:0,carb:0,fat:0};
  MEALS.forEach(function(meal){
    var checked=(day[meal.id]||{}).checked||[];
    if(checked.length>0){m.kcal+=meal.macros.kcal;m.prot+=meal.macros.prot;m.carb+=meal.macros.carb;m.fat+=meal.macros.fat;}
  });
  return m;
}

function renderNutrition() {
  var d=parseDate(nutrDate);
  var lbl=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  document.getElementById('nutrDayLbl').textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1).replace('.','');

  var cons=getConsumedMacros(nutrDate);
  var barKeys=[
    ['kcal','Calorias',TARGETS.kcal,'kcal'],
    ['prot','Proteina',TARGETS.prot,'g P'],
    ['carb','Carbs',TARGETS.carb,'g C'],
    ['fat','Fat',TARGETS.fat,'g G'],
  ];
  var barsHtml='';
  barKeys.forEach(function(b){
    var pct=Math.min(100,Math.round(cons[b[0]]/b[2]*100));
    barsHtml+='<div class="macro-row">'
      +'<span class="macro-name">'+b[1]+'</span>'
      +'<div class="macro-track"><div class="macro-fill" style="width:'+pct+'%"></div></div>'
      +'<span class="macro-val"><strong>'+cons[b[0]]+'</strong> / '+b[2]+b[3]+'</span>'
      +'</div>';
  });
  document.getElementById('macroBars').innerHTML=barsHtml;

  var day=getNutrDay(nutrDate);
  var html='';
  MEALS.forEach(function(meal){
    var md=day[meal.id]||{};
    var checked=md.checked||[];
    var qtys=md.quantities||{};
    var allDone=checked.length>=meal.items.length;
    var isOpen=checked.length>0;
    var itemsHtml='';
    meal.items.forEach(function(item){
      var isCk=checked.indexOf(item.id)>=0;
      itemsHtml+='<div class="meal-item">'
        +'<div class="item-info">'
        +'<div class="item-name">'+item.name+'</div>'
        +'<span class="item-qty" contenteditable="true" id="qty-'+meal.id+'-'+item.id+'" onblur="saveQty(\''+meal.id+'\',\''+item.id+'\',this.textContent)">'+(qtys[item.id]||item.qty)+'</span>'
        +'</div>'
        +'<div class="item-cb '+(isCk?'checked':'')+'" onclick="toggleItem(\''+meal.id+'\',\''+item.id+'\')">'
        +'<svg viewBox="0 0 12 12" fill="none" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>'
        +'</div>'
        +'</div>';
    });
    var mealNote=(day[meal.id]||{}).note||'';
    html+='<div class="meal-card '+(allDone?'done':'')+'" id="mc-'+meal.id+'">'
      +'<div class="meal-hdr" onclick="toggleMeal(\''+meal.id+'\')">'
      +'<span class="meal-name-txt">'+meal.name+'</span>'
      +'<span class="meal-time-chip">'+meal.time+'</span>'
      +'<span class="meal-kcal">'+meal.macros.kcal+' kcal</span>'
      +'<span class="meal-chev '+(isOpen?'open':'')+'">&#9662;</span>'
      +'</div>'
      +'<div class="meal-items '+(isOpen?'open':'')+'" id="mi-'+meal.id+'">'
      +itemsHtml
      +'<div class="meal-notes-wrap">'
      +'<textarea class="meal-notes" rows="2" placeholder="Observa\u00e7\u00f5es..." onblur="saveMealNote(\''+meal.id+'\',this.value)">'+mealNote+'</textarea>'
      +'</div>'
      +'</div>'
      +'</div>';
  });
  document.getElementById('mealsWrap').innerHTML=html;
}

function toggleMeal(id) {
  document.getElementById('mi-'+id).classList.toggle('open');
  document.querySelector('#mc-'+id+' .meal-chev').classList.toggle('open');
}
function toggleItem(mId,iId) {
  var day=getNutrDay(nutrDate);
  if(!day[mId]) day[mId]={checked:[],quantities:{}};
  var idx=day[mId].checked.indexOf(iId);
  if(idx>=0) day[mId].checked.splice(idx,1); else day[mId].checked.push(iId);
  saveNutrDay(nutrDate,day); renderNutrition();
}
function saveQty(mId,iId,val) {
  var day=getNutrDay(nutrDate);
  if(!day[mId]) day[mId]={checked:[],quantities:{}};
  if(!day[mId].quantities) day[mId].quantities={};
  day[mId].quantities[iId]=val.trim(); saveNutrDay(nutrDate,day);
}
function saveMealNote(mId,val) {
  var day=getNutrDay(nutrDate);
  if(!day[mId]) day[mId]={checked:[],quantities:{}};
  day[mId].note=val.trim(); saveNutrDay(nutrDate,day);
}

// ── HISTORY ───────────────────────────────────────────
function changeMonth(dir) {
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  selectedCalDate=null;
  document.getElementById('calDayCard').style.display='none';
  renderHistory();
}

function renderHistory() {
  var now2=new Date();
  var moWksStats=workouts.filter(function(w){
    var d=parseDate(w.date);
    return d.getFullYear()===now2.getFullYear()&&d.getMonth()===now2.getMonth();
  });
  var moVolStats=moWksStats.reduce(function(a,w){return a+calcVol(w);},0);
  document.getElementById('stMoCount').textContent=moWksStats.length;
  document.getElementById('stMoVol').textContent  =fmtNum(moVolStats);
  document.getElementById('stTotal').textContent  =workouts.length;
  document.getElementById('stVol').textContent    =fmtNum(totalVolAll());

  var moName=new Date(calYear,calMonth,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  document.getElementById('calLbl').textContent=moName.charAt(0).toUpperCase()+moName.slice(1);

  var firstDow=new Date(calYear,calMonth,1).getDay();
  var dim=new Date(calYear,calMonth+1,0).getDate();
  var today=new Date();
  var isCurMo=today.getFullYear()===calYear&&today.getMonth()===calMonth;

  var byDay={};
  workouts.forEach(function(w){
    var d=parseDate(w.date);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      var day=d.getDate(); if(!byDay[day]) byDay[day]=[]; byDay[day].push(w);
    }
  });

  var cells='';
  for(var i=0;i<firstDow;i++) cells+='<div class="cal-c"></div>';
  for(var d=1;d<=dim;d++){
    var isToday=isCurMo&&today.getDate()===d;
    var isFuture=isCurMo&&d>today.getDate();
    var trained=!!byDay[d];
    var isSel=selectedCalDate&&selectedCalDate.y===calYear&&selectedCalDate.m===calMonth&&selectedCalDate.d===d;
    var cls='cal-c';
    if(trained) cls+=' trained';
    if(isToday)  cls+=' today';
    if(isFuture&&!trained) cls+=' future';
    if(isSel)    cls+=' selected';
    var click=trained?' onclick="showDayCard('+calYear+','+calMonth+','+d+')"':'';
    var dot=trained?'<div class="cal-dot"></div>':'';
    cells+='<div class="'+cls+'"'+click+'>'+d+dot+'</div>';
  }
  document.getElementById('calGrid').innerHTML=cells;

  var streak=getStreak();
  var sBar=document.getElementById('streakBar');
  sBar.innerHTML=streak>0?'<strong>'+streak+' dia'+(streak>1?'s':'')+'</strong> seguido'+(streak>1?'s':''):'';

  var moWks=workouts.filter(function(w){
    var d=parseDate(w.date);
    return d.getFullYear()===calYear&&d.getMonth()===calMonth;
  }).sort(function(a,b){return b.date.localeCompare(a.date);});

  var listEl=document.getElementById('histList');
  if(!moWks.length){listEl.innerHTML='<div class="empty-state">Nenhum treino neste mes.</div>';return;}

  var moVol=moWks.reduce(function(a,w){return a+calcVol(w);},0);
  var html='<div class="mo-head"><span>'+moWks.length+' treino'+(moWks.length>1?'s':'')+'</span><span class="mo-vol">'+fmtNum(moVol)+' kg</span></div>';
  moWks.forEach(function(w){
    var vol=calcVol(w);
    var day=parseDate(w.date).getDate();
    var exList=w.exercises.slice(0,3).map(function(e){return e.name;}).join(', ')+(w.exercises.length>3?'...':'');
    var durMin=w.duration?Math.round(w.duration/60):null;
    html+='<div class="hi-item" id="hi-'+w.id+'" onclick="toggleHist('+w.id+')">'
      +'<div class="hi-hdr"><div class="hi-left">'
      +'<div class="hi-dot">'+String(day).padStart(2,'0')+'</div>'
      +'<div><div class="hi-day">'+w.dayName+'</div><div class="hi-date">'+fmtDate(w.date)+'</div></div>'
      +'</div><div class="hi-vol">'+fmtNum(vol)+' kg</div></div>'
      +'<div class="hi-exlist">'+exList+'</div>'
      +'<div class="expand" id="exp-'+w.id+'">'
      +'<div class="hi-meta">'
      +(durMin?'<span class="hi-tag">'+durMin+'min</span>':'')
      +(w.calories?'<span class="hi-tag">'+w.calories+' kcal</span>':'')
      +'</div>';
    w.exercises.forEach(function(ex){
      html+='<div class="exd-block"><div class="exd-name">'+ex.name+'</div>';
      ex.sets.forEach(function(s,i){
        html+='<div class="exd-row"><span>Serie '+(i+1)+'</span><span>'+(s.kg?s.kg+'kg':'--')+' x '+(s.reps||'--')+'</span></div>';
      });
      html+='</div>';
    });
    if(w.duration&&w.calories){
      html+='<button class="health-btn" onclick="exportHealth('+w.id+',event)">Exportar para Saude iPhone</button>'
           +'<div class="health-hint">Requer Atalho "Treino MB" instalado</div>';
    }
    html+='<button class="del-btn" onclick="delWorkout('+w.id+',event)">Excluir</button>'
         +'</div></div>';
  });
  listEl.innerHTML=html;

  if(selectedCalDate) showDayCard(selectedCalDate.y,selectedCalDate.m,selectedCalDate.d,true);
}

function showDayCard(y,m,d,silent) {
  selectedCalDate={y:y,m:m,d:d};
  document.querySelectorAll('.cal-c').forEach(function(c){c.classList.remove('selected');});
  var cells=document.querySelectorAll('.cal-grid .cal-c');
  var firstDow=new Date(y,m,1).getDay();
  var idx=firstDow+d-1;
  if(cells[idx]) cells[idx].classList.add('selected');

  var w=null;
  for(var i=0;i<workouts.length;i++){
    var dd=parseDate(workouts[i].date);
    if(dd.getFullYear()===y&&dd.getMonth()===m&&dd.getDate()===d){w=workouts[i];break;}
  }
  var card=document.getElementById('calDayCard');
  if(!w){card.style.display='none';return;}

  var vol=calcVol(w);
  var durMin=w.duration?Math.round(w.duration/60):null;
  var exCount=w.exercises.length;
  card.style.display='block';
  card.innerHTML='<div class="cdc-name">'+w.dayName+'</div>'
    +'<div class="cdc-meta">'+(durMin?durMin+' min - ':'')+exCount+' exercicio'+(exCount!==1?'s':'')+'</div>'
    +'<div class="cdc-vol">Volume total: <span>'+fmtNum(vol)+' kg</span></div>';

  if(!silent){
    var el=document.getElementById('hi-'+w.id);
    if(el){
      document.querySelectorAll('.hi-item').forEach(function(e){e.classList.remove('hl');});
      el.classList.add('hl');
      el.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }
}

function toggleHist(id) { document.getElementById('exp-'+id).classList.toggle('open'); }
function hlWorkout(y,m,d) { showDayCard(y,m,d,false); }
function delWorkout(id,e) {
  e.stopPropagation();
  if(!confirm('Excluir este treino?')) return;
  workouts=workouts.filter(function(w){return w.id!==id;});
  localStorage.setItem('mb_workouts',JSON.stringify(workouts));
  renderHistory(); updateHeader();
}
function exportHealth(id,e) {
  e.stopPropagation();
  var w=null;
  for(var i=0;i<workouts.length;i++){if(workouts[i].id===id){w=workouts[i];break;}}
  if(!w) return;
  window.location.href='shortcuts://run-shortcut?name=Treino%20MB&input=text&text='+Math.round(w.duration/60)+'%2C'+w.calories+'%2C'+encodeURIComponent(w.dayName);
}

// ── EXPORT / IMPORT ───────────────────────────────────
function exportData() {
  var blob=new Blob([JSON.stringify({workouts:workouts,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='tracker_mb_'+todayISO()+'.json'; a.click();
  showToast('Exportado.',true);
}
function importData(e) {
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var imp=data.workouts||data;
      if(!Array.isArray(imp)){showToast('Arquivo invalido.',false);return;}
      var ex=new Set(workouts.map(function(w){return w.id;})); var added=0;
      imp.forEach(function(w){if(!ex.has(w.id)){workouts.push(w);added++;}});
      localStorage.setItem('mb_workouts',JSON.stringify(workouts));
      showToast(added+' treino'+(added!==1?'s':'')+' importado'+(added!==1?'s':'')+'.',true);
      updateHeader(); renderHistory();
    }catch(err){showToast('Erro ao importar.',false);}
  };
  reader.readAsText(file); e.target.value='';
}

// ── EVOLUTION ─────────────────────────────────────────
function setPeriod(days,btn) {
  evoPeriod=days;
  document.querySelectorAll('.period-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderEvo();
}

function renderEvo() {
  var now=new Date();
  var cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-evoPeriod);
  var prevCutoff=new Date(cutoff); prevCutoff.setDate(prevCutoff.getDate()-evoPeriod);

  var inPeriod=workouts.filter(function(w){return parseDate(w.date)>=cutoff;})
    .sort(function(a,b){return a.date.localeCompare(b.date);});
  var inPrev=workouts.filter(function(w){return parseDate(w.date)>=prevCutoff&&parseDate(w.date)<cutoff;});

  var volPeriod=inPeriod.reduce(function(a,w){return a+calcVol(w);},0);
  var volPrev=inPrev.reduce(function(a,w){return a+calcVol(w);},0);
  var count=inPeriod.length;

  var totalKg=0,totalSets=0;
  inPeriod.forEach(function(w){
    w.exercises.forEach(function(ex){
      ex.sets.forEach(function(s){
        if(s.kg){totalKg+=parseFloat(s.kg);totalSets++;}
      });
    });
  });
  var avgLoad=totalSets>0?Math.round(totalKg/totalSets):0;

  document.getElementById('evoVolTotal').textContent=fmtNum(volPeriod)+' kg';
  document.getElementById('evoCount').textContent=count;
  document.getElementById('evoAvgLoad').textContent=avgLoad>0?avgLoad+' kg':'--';

  var badgeEl=document.getElementById('evoVolBadge');
  if(volPrev>0){
    var pct=Math.round((volPeriod-volPrev)/volPrev*100);
    var dir=pct>=0?'up':'down';
    var sign=pct>=0?'+':'';
    badgeEl.innerHTML='<span class="evo-badge '+dir+'">'+sign+pct+'% vs periodo anterior</span>';
  } else {
    badgeEl.innerHTML='';
  }

  var byDate={};
  inPeriod.forEach(function(w){
    if(!byDate[w.date]) byDate[w.date]=0;
    byDate[w.date]+=calcVol(w);
  });
  var sortedDates=Object.keys(byDate).sort();
  var cumVol=0,labels=[],data=[];
  sortedDates.forEach(function(d){cumVol+=byDate[d];labels.push(fmtDate(d));data.push(Math.round(cumVol));});

  if(chartInst){chartInst.destroy();chartInst=null;}

  if(data.length>0){
    chartInst=new Chart(document.getElementById('chartCanvas'),{
      type:'line',
      data:{
        labels:labels,
        datasets:[{
          data:data,
          borderColor:'#F5F5F5',
          backgroundColor:'rgba(0,255,136,.07)',
          borderWidth:2,
          fill:true,
          tension:.4,
          pointRadius:0,
          pointHoverRadius:5,
          pointHoverBackgroundColor:'#00FF88',
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#1A1A1A',
            borderColor:'rgba(255,255,255,.1)',
            borderWidth:1,
            titleColor:'#7A7A7A',
            bodyColor:'#F5F5F5',
            callbacks:{label:function(ctx){return fmtNum(ctx.raw)+' kg';}}
          }
        },
        scales:{
          x:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},maxRotation:0,maxTicksLimit:4},grid:{color:'rgba(255,255,255,.04)'}},
          y:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},callback:function(v){return fmtNum(v);}},grid:{color:'rgba(255,255,255,.04)'}}
        }
      }
    });
  }

  var DAY_NAMES=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
  var dayCounts=[0,0,0,0,0,0,0];
  inPeriod.forEach(function(w){dayCounts[parseDate(w.date).getDay()]++;});
  var bestDayIdx=dayCounts.indexOf(Math.max.apply(null,dayCounts));

  var thisWeekCut=new Date(now); thisWeekCut.setDate(now.getDate()-7);
  var lastWeekCut=new Date(now); lastWeekCut.setDate(now.getDate()-14);
  var twCount=workouts.filter(function(w){return parseDate(w.date)>=thisWeekCut;}).length;
  var lwCount=workouts.filter(function(w){return parseDate(w.date)>=lastWeekCut&&parseDate(w.date)<thisWeekCut;}).length;

  var insight='Sem dados suficientes para gerar insights.';
  if(count>0){
    var cons=twCount>lwCount?'Mais consistente que na semana passada':twCount<lwCount?'Menos treinos que na semana passada':'Ritmo similar a semana passada';
    insight=cons+'<br>Melhor dia: <strong>'+DAY_NAMES[bestDayIdx]+'</strong>';
  }
  document.getElementById('evoInsight').innerHTML=insight;
  populateExoSelect();
  renderEvoExercise();
  renderWeightChart();
}

// ── EVO EXERCISE CHART ────────────────────────────────
function populateExoSelect() {
  var sel=document.getElementById('exoSelect');
  if(!sel) return;
  var names=[]; var seen={};
  workouts.forEach(function(w){
    w.exercises.forEach(function(ex){
      if(!seen[ex.name]){seen[ex.name]=true;names.push(ex.name);}
    });
  });
  var prev=sel.value;
  if(names.length>0){
    sel.innerHTML=names.map(function(n){return '<option value="'+n+'">'+n+'</option>';}).join('');
    if(prev&&seen[prev]) sel.value=prev;
  } else {
    sel.innerHTML='<option value="">Sem treinos registrados</option>';
  }
}
function renderEvoExercise() {
  var sel=document.getElementById('exoSelect');
  var card=document.getElementById('exoChartCard');
  if(!sel||!card) return;
  var name=sel.value;
  if(!name){card.innerHTML='<div class="evo-no-data">Sem dados.</div>';return;}
  var byDate={};
  workouts.forEach(function(w){
    var ex=null;
    for(var i=0;i<w.exercises.length;i++){if(w.exercises[i].name===name){ex=w.exercises[i];break;}}
    if(!ex||!ex.sets.length) return;
    var totalKg=0,cnt=0;
    ex.sets.forEach(function(s){if(s.kg){totalKg+=parseFloat(s.kg);cnt++;}});
    if(cnt>0){
      var avg=parseFloat((totalKg/cnt).toFixed(1));
      if(!byDate[w.date]||avg>byDate[w.date]) byDate[w.date]=avg;
    }
  });
  var dates=Object.keys(byDate).sort();
  if(!dates.length){
    card.innerHTML='<div class="evo-no-data">Sem dados para este exerc\u00edcio.</div>';
    return;
  }
  card.innerHTML='<div style="position:relative;height:180px"><canvas id="exoChartCanvas"></canvas></div>';
  var labels=dates.map(function(d){return fmtDate(d);});
  var data=dates.map(function(d){return byDate[d];});
  if(exoChartInst){exoChartInst.destroy();exoChartInst=null;}
  exoChartInst=new Chart(document.getElementById('exoChartCanvas'),{
    type:'line',
    data:{labels:labels,datasets:[{
      data:data,
      borderColor:'#00FF88',
      backgroundColor:'rgba(0,255,136,.06)',
      borderWidth:2,fill:true,tension:.35,
      pointRadius:3,pointBackgroundColor:'#00FF88',pointHoverRadius:5
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1A1A1A',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
          titleColor:'#7A7A7A',bodyColor:'#F5F5F5',
          callbacks:{label:function(ctx){return ctx.raw+' kg (m\u00e9dia/s\u00e9rie)';}}
        }
      },
      scales:{
        x:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},maxRotation:0,maxTicksLimit:5},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},callback:function(v){return v+' kg';}},grid:{color:'rgba(255,255,255,.04)'}}
      }
    }
  });
}

// ── WEIGHT CHART ──────────────────────────────────────
function renderWeightChart() {
  var canvas=document.getElementById('wtChartCanvas');
  if(!canvas) return;
  var hist=JSON.parse(localStorage.getItem('mb_weight_history')||'[]');
  hist.sort(function(a,b){return a.date.localeCompare(b.date);});
  if(wtChartInst){wtChartInst.destroy();wtChartInst=null;}
  if(!hist.length) return;
  var labels=hist.map(function(h){return fmtDate(h.date);});
  var data=hist.map(function(h){return h.kg;});
  wtChartInst=new Chart(canvas,{
    type:'line',
    data:{labels:labels,datasets:[{
      data:data,
      borderColor:'#D4920A',
      backgroundColor:'rgba(212,146,10,.07)',
      borderWidth:2,fill:true,tension:.35,
      pointRadius:3,pointBackgroundColor:'#D4920A',pointHoverRadius:5
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1A1A1A',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
          titleColor:'#7A7A7A',bodyColor:'#F5F5F5',
          callbacks:{label:function(ctx){return ctx.raw+' kg';}}
        }
      },
      scales:{
        x:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},maxRotation:0,maxTicksLimit:6},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#3A3A3A',font:{family:'Inter',size:10},callback:function(v){return v+' kg';}},grid:{color:'rgba(255,255,255,.04)'}}
      }
    }
  });
}

// ── DRAFT SAVE / RESTORE ──────────────────────────────
function saveDraft() {
  typeData[selectedDay.key]=captureSets(selectedDay);
  localStorage.setItem('mb_draft',JSON.stringify({currentDayKey:selectedDay.key,timestamp:Date.now(),lastSetTime:lastSetTime,typeData:typeData}));
}

function checkDraft() {
  var raw=localStorage.getItem('mb_draft');
  if(!raw) return;
  try {
    var draft=JSON.parse(raw);
    var age=Date.now()-draft.timestamp;
    if(age>30*60*1000){localStorage.removeItem('mb_draft');return;}
    var minAgo=Math.round(age/60000);
    var dayObj=DAYS.find(function(d){return d.key===draft.currentDayKey;})||{name:draft.currentDayKey};
    document.getElementById('resumeMsg').textContent=
      'Treino '+dayObj.name+' iniciado há '+(minAgo<1?'menos de 1 min':minAgo+' min')+'.';
    document.getElementById('resumeModal').style.display='flex';
    window._pendingDraft=draft;
  } catch(e){localStorage.removeItem('mb_draft');}
}

function resumeDraft() {
  var draft=window._pendingDraft;
  document.getElementById('resumeModal').style.display='none';
  if(!draft) return;
  typeData=draft.typeData||{};
  selectedDay=DAYS.find(function(d){return d.key===draft.currentDayKey;})||selectedDay;
  renderTypeChips();
  renderExercises();
  applySets(selectedDay,typeData[selectedDay.key]);
  showTimerBar();
  lastSetTime=draft.lastSetTime||draft.timestamp;
  localStorage.removeItem('mb_draft');
  window._pendingDraft=null;
}

function discardDraft() {
  document.getElementById('resumeModal').style.display='none';
  localStorage.removeItem('mb_draft');
  window._pendingDraft=null;
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg,ok) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(ok?' ok':'');
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2600);
}

// ── ORIENTATION LOCK ──────────────────────────────────
function lockOrientation() {
  try {
    if(screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(function(){});
    }
  } catch(e) {}
}
lockOrientation();
document.addEventListener('visibilitychange',function(){ if(!document.hidden) lockOrientation(); });

// ── INIT ──────────────────────────────────────────────
renderHeaderDate();
updateHeader();
renderTypeChips();
renderExercises();
renderHistory();
startTimer();
checkDraft();

(function() {
  var splash = document.getElementById('splash');
  setTimeout(function() {
    splash.classList.add('fade');
    setTimeout(function() { splash.style.display = 'none'; }, 500);
  }, 2000);
})();
</script>
